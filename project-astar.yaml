specVersion: 1.0.0
name: lucky-subql
version: 1.0.0
runner:
  node:
    name: "@subql/node"
    version: "*"
  query:
    name: "@subql/query"
    version: "*"
description: This SubQuery project can be use as a starting point for Astar network
repository: "https://github.com/GuiGou12358/lucky-subql"
schema:
  file: ./schema.graphql
network:
  chainId: "0x9eb76c5184c4ab8679d2d5d819fdf90b9c001403e9e17da2e14b6d8aec4029c6"
  endpoint: "wss://astar.api.onfinality.io/public-ws"
  dictionary: "https://api.subquery.network/sq/subquery/astar-dictionary"
  chaintypes:
    file: ./dist/chaintypes.js
dataSources:
  - kind: substrate/Runtime
    startBlock: 4633310
    mapping:
      file: ./dist/indexAstar.js
      handlers:
        - handler: bondAndStake
          kind: substrate/EventHandler
          filter:
            module: dappsStaking
            method: BondAndStake
        - handler: unbondAndUnstake
          kind: substrate/EventHandler
          filter:
            module: dappsStaking
            method: UnbondAndUnstake
        - handler: nominationTransfer
          kind: substrate/EventHandler
          filter:
            module: dappsStaking
            method: NominationTransfer
        - handler: reward
          kind: substrate/EventHandler
          filter:
            module: dappsStaking
            method: Reward
        - handler: newDappStakingEra
          kind: substrate/EventHandler
          filter:
            module: dappsStaking
            method: NewDappStakingEra
  - kind: substrate/Wasm
    startBlock: 4633310
    processor:
      file: ./node_modules/@subql/substrate-wasm-processor/dist/bundle.js
      options:
        abi: luckyRaffle
        contract: YefiLw34yyqYniJVbgMzvu9CMyCwTWktdpAgBRycgkSy9YU
    assets:
      luckyRaffle:
        file: ./metadata_astar/lucky_raffle_metadata.json
    mapping:
      file: ./dist/indexAstar.js
      handlers:
        - handler: raffleDone
          kind: substrate/WasmEvent
          filter:
            identifier: RaffleDone
  - kind: substrate/Wasm
    startBlock: 4633310
    processor:
      file: ./node_modules/@subql/substrate-wasm-processor/dist/bundle.js
      options:
        abi: rewardManager
        contract: bbXFDjNBVhA8nmPN5pvgb8bXu5LVNpkGBKbM5QjpKyTsoZw
    assets:
      rewardManager:
        file: ./metadata_astar/reward_manager_metadata.json
    mapping:
      file: ./dist/indexAstar.js
      handlers:
        - handler: pendingReward
          kind: substrate/WasmEvent
          filter:
            identifier: PendingReward
  - kind: substrate/Wasm
    startBlock: 4633310
    processor:
      file: ./node_modules/@subql/substrate-wasm-processor/dist/bundle.js
      options:
        abi: rewardManager
        contract: bbXFDjNBVhA8nmPN5pvgb8bXu5LVNpkGBKbM5QjpKyTsoZw
    assets:
      rewardManager:
        file: ./metadata_astar/reward_manager_metadata.json
    mapping:
      file: ./dist/indexAstar.js
      handlers:
        - handler: rewardsClaimed
          kind: substrate/WasmEvent
          filter:
            identifier: RewardsClaimed
            